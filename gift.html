<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Small Surprise 💖</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe5d9,#ffccb3);
    font-family:Segoe UI, sans-serif;
    padding:15px;
}

.card{
    background:#fff6f0;
    padding:25px 18px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    width:100%;
    max-width:400px;
}

h2{
    font-size:20px;
    margin-bottom:15px;
}

#gbox{
    width:180px;
    max-width:100%;
    cursor:pointer;
    transition:transform 0.3s;
}

#gbox.opened{
    width:55px;
}

#gbox:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

.photo{
    width:100%;
    border-radius:18px;
    margin-top:15px;
}

p{
    color:#555;
    font-size:14px;
    line-height:1.6;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
    <h2>🎁 Tap the Gift 🎁</h2>

    <img id="gbox" src="gift.png" alt="Gift" onclick="openGift()">

    <div id="surprise" class="hidden">
        <p>
            You are one of the most precious people in my life 🤍<br>
            No matter what, I’ll always be there for you 💖
        </p>

        <img src="beaut1.jpg" class="photo" alt="Memory">

        <audio id="song" controls loop style="margin-top:15px; width:100%;">
            <source src="song.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
function openGift(){
    const gbox = document.getElementById("gbox");
    gbox.src = "giftopen.jpg";
    gbox.classList.add("opened");

    document.getElementById("surprise").classList.remove("hidden");

    const audio = document.getElementById("song");
    audio.play().catch(()=>{});
}
</script>

</body>
</html>
