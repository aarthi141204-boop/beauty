<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Small Surprise 💖</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe5d9,#ffccb3);
    font-family:Segoe UI, sans-serif;
    padding:15px;
}

.card{
    background:#fff6f0;
    padding:25px 18px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    width:100%;
    max-width:400px;
}

h2{
    font-size:20px;
    margin-bottom:15px;
}

/* 🎁 CLOSED gift – lite movement */
#gbox{
    width:180px;
    cursor:pointer;
    animation: softMove 2.5s ease-in-out infinite;
}

/* Lite up-down move */
@keyframes softMove {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

/* 🎁 OPENED gift – NO animation */
#gbox.opened{
    width:100px;
    animation:none;
    transform:none;
    display:block;
    margin:0 auto;
}

.hidden{
    display:none;
}

.photo{
    width:100%;
    border-radius:18px;
    margin-top:15px;
}

p{
    color:#555;
    font-size:14px;
    line-height:1.6;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
    <h2>🎁 Click the Gift 🎁</h2>

    <!-- Closed gift -->
    <img id="gbox" src="gift.png" alt="Gift" onclick="openGift()">

    <!-- Surprise -->
    <div id="surprise" class="hidden">
        <p>
            You are one of the most precious people in my life 🤍<br>
            No matter what, I’ll always be there for you 💖
        </p>

        <img src="beaut1.jpg" class="photo" alt="Memory">

        <audio id="song" controls loop style="margin-top:15px; width:100%;">
            <source src="song.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
function openGift(){
    const gbox = document.getElementById("gbox");

    // stop animation
    gbox.style.animation = "none";

    // change image to opened gift
    gbox.src = "giftopen.jpg";

    // apply opened style (NO animation)
    gbox.classList.add("opened");

    // show surprise
    document.getElementById("surprise").classList.remove("hidden");

    // play song
    document.getElementById("song").play().catch(()=>{});
}
</script>

</body>
</html>
