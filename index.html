<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Akka</title>

    <style>
    body{
        margin:0;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ffe5d9,#ffccb3);
        font-family:Segoe UI, sans-serif;
        padding:20px 10px;
        box-sizing:border-box;
    }

    .card{
        background:#fff6f0;
        padding:30px 20px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 15px 35px rgba(0,0,0,0.15);
        width:100%;
        max-width:420px;
        box-sizing:border-box;
    }

    h1{
        color:#d45d79;
    }

    img{
        width:180px;
        margin:20px 0;
    }

    /* Shake Animation */
    @keyframes shake {
        0% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
        100% { transform: translateX(0); }
    }

    button{
        background:linear-gradient(135deg,#ff9a8b,#ff6a88);
        color:white;
        border:none;
        padding:12px 28px;
        font-size:16px;
        border-radius:30px;
        cursor:pointer;
        animation: shake 1.2s infinite; /* This makes it shake */
    }

    button:active{
        transform:scale(0.95);
    }

    </style>
</head>

<body>

<div class="card">
    <h1>Happy Birthday<br>My Dear Akka❤️</h1>
    <img src="cake.jpg" alt="Cake">
    <br>
    <button onclick="window.location.href='wish.html'">
        Click for Surprise 🎁
    </button>
</div>

</body>
</html>
