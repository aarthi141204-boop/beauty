<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Akka</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ffccb3,#ffe5d9);
            font-family:Segoe UI, sans-serif;
        }
        .card{
            background:#fff6f0;
            padding:35px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }
        h1{
            color:#d45d79;
        }
        img{
            width:180px;
            margin:20px 0;
        }
        button{
            background:linear-gradient(135deg,#ff9a8b,#ff6a88);
            color:white;
            border:none;
            padding:12px 28px;
            font-size:16px;
            border-radius:30px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Happy Birthday<br>My Dear Akka🎉</h1>
    <img src="cake.jpg" alt="Cake">
    <br>
    <button onclick="window.location.href='wish.html'">
        Click for Surprise 🎁
    </button>
</div>

</body>

</html>
